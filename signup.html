<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Stackly AI & Robotics</title>
  <meta name="description" content="Create your Stackly AI account.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

  <section class="auth">
    <div class="auth-bg">
      <div class="auth-grid"></div>
      <div class="auth-orb"></div>
      <div class="auth-orb auth-orb-2"></div>
      <div class="auth-orb auth-orb-3"></div>
    </div>
    <canvas id="authCanvas"></canvas>

    <a href="index.html" class="auth-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Home
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <img src="assets/images/logo-stackly.webp" alt="Stackly AI">
        </a>
        <div class="auth-divider"></div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join Stackly AI and start automating your industrial future.</p>
      </div>

      <form class="auth-form" id="signupForm" novalidate>
        <div class="auth-field" id="nameField">
          <label class="auth-label" for="signupName">Full Name</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="text" id="signupName" placeholder="John Doe" autocomplete="name" required>
            <svg class="auth-input-icon" id="signupNameIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="auth-error" id="signupNameError"></div>
        </div>

        <div class="auth-field" id="emailField">
          <label class="auth-label" for="signupEmail">Email</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="email" id="signupEmail" placeholder="you@company.com" autocomplete="email" required>
            <svg class="auth-input-icon" id="signupEmailIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div class="auth-error" id="signupEmailError"></div>
        </div>

        <div class="auth-field" id="passwordField">
          <label class="auth-label" for="signupPassword">Password</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="signupPassword" placeholder="Create a strong password" autocomplete="new-password" required>
            <svg class="auth-input-icon" id="signupPasswordIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button class="auth-toggle-pw" type="button" id="signupTogglePw" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="auth-pw-strength" id="pwStrength">
            <div class="auth-pw-strength-bar" data-index="0"></div>
            <div class="auth-pw-strength-bar" data-index="1"></div>
            <div class="auth-pw-strength-bar" data-index="2"></div>
            <div class="auth-pw-strength-bar" data-index="3"></div>
          </div>
          <div class="auth-pw-hint" id="pwHint"></div>
          <div class="auth-error" id="signupPasswordError"></div>
        </div>

        <div class="auth-field" id="confirmField">
          <label class="auth-label" for="signupConfirm">Confirm Password</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="signupConfirm" placeholder="Re-enter your password" autocomplete="new-password" required>
            <svg class="auth-input-icon" id="signupConfirmIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="auth-error" id="signupConfirmError"></div>
        </div>

        <div class="auth-role">
          <input class="auth-role-input" type="radio" name="signupRole" id="signupRoleUser" value="user" checked>
          <label class="auth-role-label" for="signupRoleUser">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            User
          </label>
          <input class="auth-role-input" type="radio" name="signupRole" id="signupRoleAdmin" value="admin">
          <label class="auth-role-label" for="signupRoleAdmin">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Admin
          </label>
        </div>

        <button class="auth-btn" type="submit" id="signupBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Create Account
        </button>
      </form>

      <div class="auth-social">
        <div class="auth-social-divider"><span>Or continue with</span></div>
        <div class="auth-social-btns">
          <button class="auth-social-btn" onclick="location.href='404.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="auth-social-btn" onclick="location.href='404.html'">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
      </div>

      <div class="auth-footer">
        <p class="auth-footer-text">Already have an account? <a href="login.html" class="auth-footer-link">Log In</a></p>
      </div>
    </div>
  </section>

  <script>
    (function () {
      /* ── Particle Canvas ── */
      (function () {
        var c = document.getElementById('authCanvas');
        if (!c) return;
        var ctx = c.getContext('2d');
        var w, h;
        function resize() {
          w = window.innerWidth; h = window.innerHeight;
          c.width = w; c.height = h;
        }
        resize();
        window.addEventListener('resize', resize);

        var particles = [];
        var count = 60;
        for (var i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            r: Math.random() * 1.5 + 0.5,
            a: Math.random() * 0.4 + 0.1
          });
        }

        function draw() {
          ctx.clearRect(0, 0, w, h);
          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 229, 255, ' + p.a + ')';
            ctx.fill();

            for (var j = i + 1; j < particles.length; j++) {
              var p2 = particles[j];
              var dx = p.x - p2.x;
              var dy = p.y - p2.y;
              var dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 120) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = 'rgba(0, 229, 255, ' + (0.04 * (1 - dist / 120)) + ')';
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          }
          requestAnimationFrame(draw);
        }
        draw();
      })();

      /* ── Form Logic ── */
      var form = document.getElementById('signupForm');
      var name = document.getElementById('signupName');
      var email = document.getElementById('signupEmail');
      var password = document.getElementById('signupPassword');
      var confirm = document.getElementById('signupConfirm');
      var nameError = document.getElementById('signupNameError');
      var emailError = document.getElementById('signupEmailError');
      var passwordError = document.getElementById('signupPasswordError');
      var confirmError = document.getElementById('signupConfirmError');
      var nameIcon = document.getElementById('signupNameIcon');
      var emailIcon = document.getElementById('signupEmailIcon');
      var passwordIcon = document.getElementById('signupPasswordIcon');
      var confirmIcon = document.getElementById('signupConfirmIcon');
      var nameField = document.getElementById('nameField');
      var emailField = document.getElementById('emailField');
      var passwordField = document.getElementById('passwordField');
      var confirmField = document.getElementById('confirmField');
      var togglePw = document.getElementById('signupTogglePw');
      var btn = document.getElementById('signupBtn');
      var pwBars = document.querySelectorAll('.auth-pw-strength-bar');
      var pwHint = document.getElementById('pwHint');

      /* Floating labels */
      var fields = [
        { el: nameField, input: name },
        { el: emailField, input: email },
        { el: passwordField, input: password },
        { el: confirmField, input: confirm }
      ];
      fields.forEach(function (f) {
        f.input.addEventListener('focus', function () { f.el.classList.add('focused'); });
        f.input.addEventListener('blur', function () {
          if (!f.input.value.trim()) f.el.classList.remove('focused');
        });
        if (f.input.value.trim()) f.el.classList.add('focused');
      });

      /* Toggle password */
      togglePw.addEventListener('click', function () {
        var type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        togglePw.innerHTML = type === 'password'
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      });

      /* Helpers */
      function validateEmail(v) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }
      function validateName(v) {
        return /^[A-Za-z\s'-]+$/.test(v);
      }
      function validatePasswordStrength(v) {
        return {
          length: v.length >= 8,
          upper: /[A-Z]/.test(v),
          lower: /[a-z]/.test(v),
          number: /[0-9]/.test(v)
        };
      }
      function isPasswordStrong(v) {
        var s = validatePasswordStrength(v);
        return s.length && s.upper && s.lower && s.number;
      }
      function showError(el, msg) {
        el.textContent = msg;
      }
      function clearError(el) {
        el.textContent = '';
      }
      function setFieldState(input, icon, valid) {
        if (valid) {
          input.classList.add('valid');
          input.classList.remove('error');
          icon.classList.add('visible', 'valid');
          icon.classList.remove('error');
          icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
        } else {
          input.classList.add('error');
          input.classList.remove('valid');
          icon.classList.add('visible', 'error');
          icon.classList.remove('valid');
          icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
        }
      }
      function clearFieldState(input, icon) {
        input.classList.remove('error', 'valid');
        icon.classList.remove('visible', 'valid', 'error');
      }
      function validateField(input, icon, errorEl, validator, msg) {
        var val = input.value.trim();
        if (!val) {
          showError(errorEl, 'This field is required');
          setFieldState(input, icon, false);
          return false;
        }
        if (!validator(val)) {
          showError(errorEl, msg);
          setFieldState(input, icon, false);
          return false;
        }
        clearError(errorEl);
        setFieldState(input, icon, true);
        return true;
      }

      /* Password strength bar and hint */
      function updatePwStrength(v) {
        var s = validatePasswordStrength(v);
        var score = [s.lower, s.upper, s.number, s.length].filter(Boolean).length;
        var colors = ['#FF4466', '#FF6B44', '#FFB800', '#00CC88'];
        var labels = ['Weak', 'Fair', 'Good', 'Strong'];
        var textColors = ['#FF4466', '#FF6B44', '#FFB800', '#00CC88'];

        for (var i = 0; i < pwBars.length; i++) {
          var bar = pwBars[i];
          if (i < score && v.length > 0) {
            bar.classList.add('active');
            bar.style.setProperty('--bar-color', colors[score - 1]);
          } else {
            bar.classList.remove('active');
          }
        }

        if (v.length > 0) {
          var label = score > 0 ? labels[score - 1] : 'Weak';
          var color = score > 0 ? textColors[score - 1] : '#FF4466';
          pwHint.innerHTML = 'Strength: <span class="' + (score <= 1 ? 'weak' : score === 2 ? 'medium' : 'met') + '">' + label + '</span>';
        } else {
          pwHint.innerHTML = '';
        }
      }

      /* Validation functions */
      function validateNameField() {
        var val = name.value.trim();
        if (!val) { showError(nameError, 'Name is required'); setFieldState(name, nameIcon, false); return false; }
        if (!validateName(val)) { showError(nameError, 'Only letters allowed'); setFieldState(name, nameIcon, false); return false; }
        clearError(nameError); setFieldState(name, nameIcon, true); return true;
      }
      function validateEmailField() {
        var val = email.value.trim();
        if (!val) { showError(emailError, 'Email is required'); setFieldState(email, emailIcon, false); return false; }
        if (!validateEmail(val)) { showError(emailError, 'Enter a valid email'); setFieldState(email, emailIcon, false); return false; }
        clearError(emailError); setFieldState(email, emailIcon, true); return true;
      }
      function validatePasswordField() {
        var val = password.value;
        if (!val) { showError(passwordError, 'Password is required'); setFieldState(password, passwordIcon, false); return false; }
        if (!isPasswordStrong(val)) { showError(passwordError, 'Password is not strong enough'); setFieldState(password, passwordIcon, false); return false; }
        clearError(passwordError); setFieldState(password, passwordIcon, true); return true;
      }
      function validateConfirmField() {
        var val = confirm.value;
        if (!val) { showError(confirmError, 'Please confirm your password'); setFieldState(confirm, confirmIcon, false); return false; }
        if (val !== password.value) { showError(confirmError, 'Passwords do not match'); setFieldState(confirm, confirmIcon, false); return false; }
        clearError(confirmError); setFieldState(confirm, confirmIcon, true); return true;
      }

      /* Name events */
      name.addEventListener('input', function () {
        var val = name.value;
        if (!val) { clearError(nameError); clearFieldState(name, nameIcon); return; }
        if (!validateName(val)) {
          showError(nameError, 'Only letters allowed');
          setFieldState(name, nameIcon, false);
        } else {
          clearError(nameError); setFieldState(name, nameIcon, true);
        }
      });
      name.addEventListener('blur', function () {
        if (name.value.trim()) validateNameField();
      });

      /* Email events */
      email.addEventListener('input', function () {
        var val = email.value.trim();
        if (!val) { clearError(emailError); clearFieldState(email, emailIcon); return; }
        validateEmailField();
      });
      email.addEventListener('blur', function () {
        if (email.value.trim()) validateEmailField();
      });

      /* Password events */
      password.addEventListener('input', function () {
        updatePwStrength(password.value);
        if (password.value) {
          validatePasswordField();
          if (confirm.value) validateConfirmField();
        } else {
          clearError(passwordError); clearFieldState(password, passwordIcon);
          for (var i = 0; i < pwBars.length; i++) pwBars[i].classList.remove('active');
          pwHint.innerHTML = '';
        }
      });
      password.addEventListener('blur', function () {
        if (password.value) validatePasswordField();
      });

      /* Confirm events */
      confirm.addEventListener('input', function () {
        if (confirm.value) {
          validateConfirmField();
        } else {
          clearError(confirmError); clearFieldState(confirm, confirmIcon);
        }
      });
      confirm.addEventListener('blur', function () {
        if (confirm.value) validateConfirmField();
      });

      /* Submit */
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var n = validateNameField();
        var eOk = validateEmailField();
        var p = validatePasswordField();
        var c = validateConfirmField();
        if (n && eOk && p && c) {
          btn.disabled = true;
          btn.innerHTML = '<span class="auth-spinner"></span> Creating Account...';
          var selectedRole = (document.querySelector('input[name="signupRole"]:checked') || {}).value || 'user';
          localStorage.setItem('authRole', selectedRole);
          localStorage.setItem('authName', name.value.trim());
          localStorage.setItem('authEmail', email.value.trim());
          setTimeout(function () {
            form.innerHTML =
              '<div class="auth-success">' +
                '<div class="auth-success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
                '<div class="auth-success-title">Account Created!</div>' +
                '<p class="auth-success-desc">Welcome aboard! Redirecting you to your dashboard...</p>' +
                '<div class="auth-confetti">' +
                  '<div class="auth-confetti-piece"></div><div class="auth-confetti-piece"></div>' +
                  '<div class="auth-confetti-piece"></div><div class="auth-confetti-piece"></div>' +
                  '<div class="auth-confetti-piece"></div><div class="auth-confetti-piece"></div>' +
                  '<div class="auth-confetti-piece"></div><div class="auth-confetti-piece"></div>' +
                '</div>' +
              '</div>';
            setTimeout(function () { window.location.href = selectedRole === 'admin' ? 'dashboard-admin.html' : 'dashboard-user.html'; }, 1800);
          }, 1000);
        }
      });
    })();
  </script>
</body>
</html>
